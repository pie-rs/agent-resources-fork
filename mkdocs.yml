site_name: Agent Resources
site_url: https://kasperjunge.github.io/agent-resources/site/
site_description: A package manager for AI agent skills.
site_author: Kasper Junge
repo_url: https://github.com/kasperjunge/agent-resources
repo_name: kasperjunge/agent-resources

docs_dir: docs/docs
site_dir: docs/site

theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

  font:
    code: Roboto Mono

  logo: images/puzzle.png

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow
  custom_dir: docs/overrides

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kasperjunge/agent-resources
      name: Agent Resources on GitHub
  generator: false

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - meta
  - toc:
      permalink: true

nav:
  - Getting Started:
    - Home: index.md
    - Tutorial: tutorial.md
    - Core Concepts: concepts.md
    - Skill Directory: skills.md
    - Guides: guides.md
  - Tools & Config:
    - Supported Tools: tools.md
    - Configuration: configuration.md
    - agrx: agrx.md
  - Building:
    - Creating Skills: creating.md
    - Python SDK: sdk.md
  - Help:
    - Troubleshooting: troubleshooting.md
    - Reference: reference.md
    - What's New: changelog.md
