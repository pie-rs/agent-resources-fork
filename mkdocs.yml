site_name: agr
site_url: https://kasperjunge.github.io/agent-resources/
site_description: A package manager for AI agent skills.
site_author: Kasper Junge
repo_url: https://github.com/kasperjunge/agent-resources
repo_name: kasperjunge/agent-resources
edit_uri: edit/main/docs/docs/

docs_dir: docs/docs
site_dir: docs/site

theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

  font:
    code: Roboto Mono

  logo: images/puzzle.png

  favicon: images/puzzle.png

  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - navigation.path
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
  custom_dir: docs/overrides

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kasperjunge/agent-resources
      name: Agent Resources on GitHub
  generator: false
  analytics:
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/thumb-up-outline
          name: This page was helpful
          data: 1
          note: Thanks for the feedback!
        - icon: material/thumb-down-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for the feedback! Help us improve by
            <a href="https://github.com/kasperjunge/agent-resources/issues/new?title=Docs+feedback:+{title}&labels=docs" target="_blank">opening an issue</a>.

not_in_nav: |
  404.md

validation:
  nav:
    omitted_files: info
    not_found: warn
    absolute_links: info
  links:
    not_found: warn
    anchors: warn
    absolute_links: info
    unrecognized_links: info

plugins:
  - search:
      separator: '[\s\-\._]+'

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      auto_append:
        - docs/includes/abbreviations.md
  - admonition
  - pymdownx.details
  - abbr
  - tables
  - def_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - meta
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Tutorial: tutorial.md
    - Core Concepts: concepts.md
  - Guides:
    - Supported Tools: tools.md
    - Skill Directory: skills.md
    - Teams: teams.md
    - Configuration: configuration.md
    - "agrx — Try Without Installing": agrx.md
  - Building Skills:
    - Creating Skills: creating.md
    - Python SDK: sdk.md
  - Contributing:
    - contributing/index.md
    - Architecture: contributing/architecture.md
  - Reference:
    - CLI Reference: reference.md
    - Troubleshooting: troubleshooting.md
    - What's New: changelog.md
